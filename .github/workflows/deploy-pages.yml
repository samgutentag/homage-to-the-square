name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Custom domain (public/CNAME) serves at root; otherwise it's a project page at /<repo>/.
      - name: Determine base path
        id: base
        run: |
          if [ -f public/CNAME ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/homage-to-the-square/" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        run: npx vite build --base "${{ steps.base.outputs.path }}"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
